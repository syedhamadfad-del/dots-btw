# Tokyo Night color palette
$bg         = rgba(26,27,38,1.0)
$fg         = rgba(192,202,245,1.0)
$accent     = rgba(122,162,247,1.0)
$red        = rgba(247,118,142,1.0)
$green      = rgba(158,206,106,1.0)
$yellow     = rgba(224,175,104,1.0)

general {
    disable_loading_bar = false
    hide_cursor = true
}

background {
    path = ~/dune.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.2
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}
# Vertical clock (stacked time)
label {
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = $fg

    font_size = 120
    font_family = JetBrainsMono Nerd Font

    position = 0, 100
    halign = center
    valign = center
}

# Date under clock
label {
    text = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
    color = $accent

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, -40
    halign = center
    valign = center
}

# Input field (visible + styled)
input-field {
    size = 320, 55
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    outer_color = $accent
    inner_color = rgba(30,30,46,0.6)
    font_color = $fg

    check_color = $yellow
    fail_color = $red

    placeholder_text = <span>Password...</span>
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = false
    rounding = 0

    position = 0, -150
    halign = center
    valign = center
}

# Optional: status text (wrong password, etc.)
label {
    text = $FAIL
    color = $red
    font_size = 16
    font_family = JetBrainsMono Nerd Font

    position = 0, -220
    halign = center
    valign = center
}
